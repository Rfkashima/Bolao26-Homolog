<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#02040a" />
  <title>Bolão Copa 2026</title>
  <meta name="description" content="Bolão Copa 2026" />
  <link rel="preconnect" href="https://script.google.com" />
  <link rel="preconnect" href="https://script.googleusercontent.com" />
  <link rel="preload" as="image" href="header-bolao-copa-2026-mobile.webp" media="(max-width: 720px)" fetchpriority="high" />
  <link rel="preload" as="image" href="header-bolao-copa-2026.webp" media="(min-width: 721px)" fetchpriority="high" />
  <link rel="stylesheet" href="style.css?v=20260628-pc-pick-before-team-v16" />
  <script src="data.js?v=20260627-mobile-bracket-round-v11" defer></script>
  <script src="app.js?v=20260628-live-knockout-third-place-goals-deduped-pc-input-v15" defer></script>
  <style id="critical-picks-ui">
    .picks-stage-switch{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;width:min(100%,520px);margin:0 auto;padding:5px;border:1px solid rgba(0,167,255,.38);border-radius:16px;background:rgba(3,8,18,.92)}
    .picks-stage-button{min-height:44px;border:1px solid transparent;border-radius:12px;background:transparent;color:#aeb8c7;font-weight:950;cursor:pointer}
    .picks-stage-button.active{border-color:rgba(255,255,255,.58);background:linear-gradient(135deg,#00a7ff,#004cff);color:#fff}
    .knockout-funnel{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
    .knockout-stage{display:grid;gap:8px}.knockout-stage-1{width:100%}.knockout-stage-2{width:88%}.knockout-stage-3{width:76%}.knockout-stage-4{width:64%}.knockout-stage-5{width:52%}
    .knockout-stage-title{width:100%;min-height:42px;border:1px solid rgba(0,167,255,.42);border-radius:12px;background:#050c19;color:#f8fbff;font-weight:1000}
    .knockout-stage.selected .knockout-stage-title{background:linear-gradient(135deg,#00a7ff,#004cff)}
    .knockout-stage-matches{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.knockout-stage-5 .knockout-stage-matches{grid-template-columns:1fr}
    .knockout-funnel-match{display:grid;gap:6px;width:100%;border:1px solid rgba(0,167,255,.32);border-radius:12px;padding:9px;background:#050c19;color:#f8fbff;text-align:left}
    @media(max-width:720px){.knockout-stage-1{width:100%}.knockout-stage-2{width:96%}.knockout-stage-3{width:92%}.knockout-stage-4{width:88%}.knockout-stage-5{width:84%}.knockout-stage-matches{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="hero" aria-label="Bolão Copa 2026"></div>
  </header>

  <nav class="main-tabs" aria-label="Navegação principal">
    <button type="button" data-view="inicio" class="active">Início</button>
    <button type="button" data-view="ranking">Ranking</button>
    <button type="button" data-view="oficial">Oficial</button>
    <button type="button" data-view="palpites">Palpites</button>
  </nav>

  <main id="app" class="container"></main>
</body>
</html>
